<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ITMen — Пайплайн Q3</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <div class="app">
    <aside class="sidebar" id="sidebar">
      <div class="sidebar-brand">
        <h1>ITMen Q3</h1>
        <p>Пайплайн · Паспорт сделок · Скоринг</p>
      </div>
      <nav class="nav" id="nav"></nav>
      <div class="sidebar-user" id="user-bar"></div>
      <div class="sidebar-footer">Данные на сервере · автосохранение</div>
    </aside>

    <div class="main">
      <header class="topbar">
        <div style="display:flex;align-items:center;gap:.75rem">
          <button class="btn menu-toggle" id="menu-toggle">☰</button>
          <h2 id="page-title">Дашборд пайплайна</h2>
        </div>
        <div class="topbar-actions">
          <button class="btn" id="btn-save">💾 Сохранить</button>
          <button class="btn" id="btn-export">⬇️ Экспорт JSON</button>
          <label class="btn" style="cursor:pointer">⬆️ Импорт JSON<input type="file" id="btn-import" accept=".json" hidden></label>
          <button class="btn btn-danger" id="btn-reset">↺ Сброс</button>
        </div>
      </header>

      <main class="content">
        <section class="page" id="page-panel"></section>
        <section class="page" id="page-deals"></section>
        <section class="page" id="page-scoring"></section>
      </main>
    </div>
  </div>

  <div class="modal-overlay" id="deal-modal">
    <div class="modal">
      <div class="modal-header">
        <h3>Паспорт сделки</h3>
        <button class="btn btn-sm" onclick="closeModal('deal-modal')">✕</button>
      </div>
      <div class="modal-body"></div>
      <div class="modal-footer">
        <button class="btn" onclick="closeModal('deal-modal')">Отмена</button>
        <button class="btn btn-primary" onclick="saveDealModal()">Сохранить</button>
      </div>
    </div>
  </div>

  <div class="toast" id="toast"></div>

  <script src="https://cdn.sheetjs.com/xlsx-0.20.3/package/dist/xlsx.full.min.js"></script>
  <script src="js/initial-data.js"></script>
  <script src="js/config.js"></script>
  <script src="js/architecture-data.js"></script>
  <script src="js/tech-research.js"></script>
  <script src="js/calc.js"></script>
  <script src="js/api.js"></script>
  <script src="js/import-excel.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
