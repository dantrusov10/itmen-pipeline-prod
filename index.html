<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ITMen — Пайплайн</title>
  <link rel="stylesheet" href="css/style.css?v=crm3">
</head>
<body>
  <div class="app">
    <aside class="sidebar" id="sidebar">
      <div class="sidebar-brand">
        <h1>ИТМен</h1>
        <p>Пайплайн · Паспорт сделок · Скоринг</p>
      </div>
      <nav class="nav" id="nav"></nav>
      <div class="sidebar-footer">Общий пайплайн · Google Таблица / сервер</div>
    </aside>

    <div class="main">
      <header class="topbar">
        <div style="display:flex;align-items:center;gap:.75rem">
          <button class="btn menu-toggle" id="menu-toggle">☰</button>
          <h2 id="page-title">Дашборд пайплайна</h2>
        </div>
      </header>

      <main class="content">
        <section class="page" id="page-panel"></section>
        <section class="page" id="page-deals"></section>
        <section class="page" id="page-kanban"></section>
        <section class="page" id="page-calendar"></section>
        <section class="page" id="page-reports"></section>
        <section class="page" id="page-scoring"></section>
        <section class="page" id="page-profile"></section>
      </main>
    </div>
  </div>

  <div class="modal-overlay" id="deal-modal">
    <div class="modal">
      <div class="modal-header modal-header-sticky">
        <h3>Паспорт сделки</h3>
        <div class="modal-header-actions">
          <button type="button" class="btn btn-primary btn-sm" onclick="saveDealModal()">Сохранить</button>
          <button type="button" class="btn btn-sm" onclick="closeModal('deal-modal')" aria-label="Закрыть">✕</button>
        </div>
      </div>
      <div class="deal-tabs-wrap" id="deal-tabs-wrap" hidden>
        <div class="deal-tabs" id="deal-tabs" role="tablist"></div>
      </div>
      <div class="modal-body"></div>
    </div>
  </div>

  <div class="toast" id="toast"></div>

  <script src="js/bootstrap.js"></script>
  <script src="js/config.js"></script>
  <script src="js/tech-research.js"></script>
  <script src="js/passport-completeness.js?v=feat2"></script>
  <script src="js/calc.js?v=ui6"></script>
  <script src="js/gas-config.js?v=pb2"></script>
  <script src="js/auth.js?v=pb2"></script>
  <script src="js/api.js?v=pb4"></script>
  <script src="js/crm-api.js?v=crm2"></script>
  <script src="js/deals-table.js?v=crm3"></script>
  <script src="js/report-filters.js?v=feat2"></script>
  <script src="js/dynamics.js?v=pb1"></script>
  <script src="js/pipeline-cache.js?v=perf3"></script>
  <script src="js/deal-crm-ui.js?v=crm3"></script>
  <script src="js/kanban.js?v=crm3"></script>
  <script src="js/calendar.js?v=crm2"></script>
  <script src="js/profile.js?v=crm2"></script>
  <script src="js/reports.js?v=crm3"></script>
  <script src="js/notifications-ui.js?v=crm1"></script>
  <script src="js/import-excel.js" defer></script>
  <script src="https://cdn.sheetjs.com/xlsx-0.20.3/package/dist/xlsx.full.min.js" defer></script>
  <script src="js/export-deals-excel.js?v=feat1" defer></script>
  <script src="js/app.js?v=crm3"></script>
</body>
</html>
