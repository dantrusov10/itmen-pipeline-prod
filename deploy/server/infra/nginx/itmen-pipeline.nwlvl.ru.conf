server {
    server_name itmen-pipeline.nwlvl.ru;

    root /opt/itmen-pipeline/frontend/current;
    index index.html;

    client_max_body_size 50m;

    # Все REST API — Express (PocketBase только на localhost)
    location ^~ /api/ {
        proxy_pass http://127.0.0.1:3010;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 300s;
        client_max_body_size 50m;
    }

    # PocketBase Admin UI — только localhost / SSH-туннель
    location /_/ {
        allow 127.0.0.1;
        deny all;
        return 403;
    }

    # Статика фронта (веб-морда)
    location / {
        try_files $uri $uri/ /index.html;
    }

    listen 443 ssl;
    ssl_certificate /etc/letsencrypt/live/itmen-pipeline.nwlvl.ru/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/itmen-pipeline.nwlvl.ru/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;
}

server {
    if ($host = itmen-pipeline.nwlvl.ru) {
        return 301 https://$host$request_uri;
    }

    listen 80;
    server_name itmen-pipeline.nwlvl.ru;
    return 404;
}
